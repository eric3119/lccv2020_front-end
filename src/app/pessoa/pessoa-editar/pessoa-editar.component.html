<div>
    <h6><strong>Atualiza pessoa</strong></h6>
    <hr />
</div>
<form [formGroup]="pessoaForm" (ngSubmit)="updatePessoa(pessoaForm.value)">
    <div class="form-group d-flex justify-content-between">
        <label class="col-sm-2 col-form-label" for="nome">Nome</label>
        <div class="col-sm-10">
            <input name="nome" class="form-control" formControlName="nome">
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-sm-12">
            <div class="input-group">
                <label class="col-sm-2 col-form-label" for="cpf">CPF</label>
                <div class="col-sm-4">
                    <input name="cpf" class="form-control" formControlName="cpf">
                </div>
            </div>
            <div class="input-group">
                <label class="col-sm-2 col-form-label" for="data_nascimento">Nascimento</label>
                <div class="col-sm-4">
                    <input name="data_nascimento" class="form-control" formControlName="data_nascimento" />
                </div>
            </div>
        </div>
    </div>
    <div class="form-group d-flex justify-content-between">
        <label class="col-sm-2 col-form-label" for="email">E-mail</label>
        <div class="col-sm-10">
            <input name="email" class="form-control" formControlName="email">
        </div>
    </div>
    <div class="form-inline">
        <div class="form-group">
            <label class="col-sm-2 col-form-label" for="salario">Salário</label>
            <input name="salario" class="form-control" formControlName="salario">
        </div>
        <select class="form-control" formControlName="id_tp_vinculo">
            <option [ngValue]="null" disabled>Selecione o vínculo</option>
            <option *ngFor="let vinculo of vinculos" [ngValue]="vinculo.id">
                {{ vinculo.tp_vinculo }}
            </option>
        </select>
    </div>
    <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" formControlName="ativo" id="input-ativo">
        <label class="form-check-label" for="input-ativo">Ativo?</label>
    </div>
    <div class="d-flex justify-content-center">
        <button type="button" class="btn btn-danger mr-3" (click)="goBack()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="!pessoaForm.valid" >Cadastrar</button>
    </div>
</form>
