<div>
    <h6><strong>Pessoas</strong></h6>
    <hr />
    <a href="/pessoa-novo" class="btn btn-dark">
        <i class="fa fa-plus" style="color: white;" aria-hidden="true"></i>
    </a>
</div>
<table class="table table-striped mt-2" *ngIf="!isLoadingResults">
    <thead>
        <tr>
            <th scope="col">Id</th>
            <th scope="col">Nome</th>
            <th scope="col">CPF</th>
            <th scope="col">Nascimento</th>
            <th scope="col">Salário</th>
            <th scope="col">E-mail</th>
            <th scope="col">Ativo</th>
            <th scope="col">Vínculo</th>
            <th scope="col">Ações</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let pessoa of dataSource">
            <th scope="row">{{ pessoa.id }}</th>
            <td scope="row">{{ pessoa.nome }}</td>
            <td scope="row">{{ pessoa.cpf }}</td>
            <td scope="row">{{ pessoa.data_nascimento }}</td>
            <td scope="row">{{ pessoa.salario }}</td>
            <td scope="row">{{ pessoa.email }}</td>
            <td scope="row" *ngIf="pessoa.ativo; else elseBlock">Sim</td>
            <ng-template scope="row" #elseBlock>Não</ng-template>
            <td scope="row">{{ pessoa.tp_vinculo }}</td>
            <td class="d-flex justify-content-around">
                <a href="/pessoa-editar/{{ pessoa.id }}" class="btn btn-dark">
                    <i class="fa fa-pencil"></i>
                </a>
                <app-pessoa-deletar></app-pessoa-deletar>
                <a href="/pessoa-deletar/{{ pessoa.id }}" class="btn btn-danger">
                    <i class="fa fa-times"></i>
                </a>
            </td>
        </tr>
    </tbody>
</table>
