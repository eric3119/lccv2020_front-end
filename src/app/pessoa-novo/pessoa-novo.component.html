<div>
    <h3>Adicionar Pessoa</h3>
</div>
<form class="example-container" [formGroup]="pessoaForm" (ngSubmit)="addPessoa(pessoaForm.value)">
    <div class="form-field">
        <input name="nome" placeholder="Nome" formControlName="nome">
    </div>
    <div class="form-field">
        <input name="cpf" placeholder="CPF" formControlName="cpf">
    </div>
    <div class="form-field">
        <input name="data_nascimento" placeholder="Nascimento" formControlName="data_nascimento" />
    </div>
    <div class="form-field">
        <input name="salario" placeholder="Salário" formControlName="salario">
    </div>
    <div class="form-field">
        <input name="email" placeholder="E-mail" formControlName="email">
    </div>
    <div class="form-field">
        <label for="ativo" >Ativo</label>
        <input type="checkbox" name="ativo" placeholder="Ativo" formControlName="ativo">
    </div>
    <select formControlName="id_tp_vinculo">
        <option [ngValue]="null" disabled>Selecione o vínculo</option>
        <option *ngFor="let vinculo of vinculos" [ngValue]="vinculo.id">
            {{ vinculo.tp_vinculo }}
        </option>
    </select> 
  
    <button type="submit" [disabled]="!pessoaForm.valid" color="primary" >Adicionar</button>
</form>
